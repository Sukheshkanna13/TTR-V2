<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Hotel Booking</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-text">GrandStay</a>
        <div class="nav-links" id="nav-links-container">
            <!-- Dynamically populated by auth.js -->
        </div>
    </nav>

    <div class="container" style="max-width: 400px;">
        <div class="card">
            <h2 style="margin-bottom: 1rem;">Login</h2>
            <div id="errorBox" class="alert hidden"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required value="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required value="MyPass123!">
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign Up here</a>
            </p>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            
            try {
                const res = await fetch('http://127.0.0.1:8000/accounts/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include' // Crucial for storing session cookie
                });
                
                if (res.ok) {
                    window.location.href = 'index.html'; // Go home on success
                } else {
                    const data = await res.json();
                    errorBox.textContent = data.detail || data.error || 'Login failed';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = 'Network error';
                errorBox.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
