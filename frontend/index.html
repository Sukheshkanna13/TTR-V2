<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Booking</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-text">GrandStay</a>
        <div class="nav-links" id="nav-links-container">
            <!-- Dynamically populated by auth.js -->
        </div>
    </nav>

    <div class="hero">
        <h1>Find Your Perfect Stay</h1>
        <p>Book the best rooms at the best prices, anywhere in the world.</p>
    </div>

    <div class="container" style="position: relative; z-index: 10;">
        <div class="card" style="max-width: 900px; margin: 0 auto;">
            <form id="searchForm" onsubmit="handleSearch(event)">
                <div class="grid-4">
                    <div class="form-group">
                        <label>Destination</label>
                        <input type="text" id="city" required placeholder="e.g. Mumbai">
                    </div>
                    <div class="form-group">
                        <label>Check-in Date</label>
                        <input type="date" id="check_in" required>
                    </div>
                    <div class="form-group">
                        <label>Check-out Date</label>
                        <input type="date" id="check_out" required>
                    </div>
                    <div class="form-group">
                        <label>Guests</label>
                        <input type="number" id="guests" min="1" required value="1">
                    </div>
                </div>
                <div style="margin-top: 1rem;">
                    <button type="submit" class="btn">Search Available Rooms</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function handleSearch(e) {
            e.preventDefault();
            const city = document.getElementById('city').value;
            const check_in = document.getElementById('check_in').value;
            const check_out = document.getElementById('check_out').value;
            const guests = document.getElementById('guests').value;
            window.location.href = `search.html?city=${city}&check_in=${check_in}&check_out=${check_out}&guests=${guests}`;
        }
    </script>
</body>
</html>
