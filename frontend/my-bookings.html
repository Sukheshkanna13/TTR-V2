<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - GrandStay</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
    <style>
        /* ===== Page Header ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* ===== Stats Bar ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.3rem;
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-confirmed .stat-number { color: #16a34a; }
        .stat-pending .stat-number { color: #d97706; }
        .stat-total .stat-number { color: var(--primary); }
        .stat-spent .stat-number { color: #7c3aed; }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 1.5rem;
        }
        .tab {
            padding: 0.9rem 1.75rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-light);
            transition: all 0.2s;
            margin-bottom: -2px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
        }
        .tab-count {
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .tab.active .tab-count {
            background: #eff6ff;
            color: var(--primary);
        }

        /* ===== Booking Card ===== */
        .booking-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
            align-items: center;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        .booking-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .booking-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.6rem;
        }
        .booking-header h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0;
        }

        /* ===== Status Badges ===== */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .badge.confirmed { background: #dcfce7; color: #15803d; }
        .badge.pending { background: #fef9c3; color: #a16207; }
        .badge.cancelled { background: #fee2e2; color: #b91c1c; }
        .badge.expired { background: #f3f4f6; color: #6b7280; }
        .badge.failed { background: #fce7f3; color: #9d174d; }

        /* ===== Booking Details Grid ===== */
        .booking-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.88rem;
            color: var(--text-light);
        }
        .meta-item .icon { font-size: 1rem; }
        .meta-item strong { color: var(--text); font-weight: 600; }

        .booking-ref {
            font-size: 0.82rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .booking-ref span {
            font-family: 'Courier New', monospace;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        /* ===== Right Side (Price + Actions) ===== */
        .booking-actions {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.75rem;
        }
        .booking-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
        }
        .booking-nights {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: -0.3rem;
        }

        /* ===== Cancel Button ===== */
        .cancel-btn {
            padding: 0.5rem 1.25rem;
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .cancel-btn:hover {
            background: #fef2f2;
            transform: translateY(-1px);
        }
        .cancel-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== Pay Now Button ===== */
        .pay-btn {
            padding: 0.5rem 1.25rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .pay-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state h3 { color: var(--text); margin-bottom: 0.5rem; }
        .empty-state p { margin-bottom: 1.5rem; }

        /* ===== Cancel Modal ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s;
        }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s;
        }
        .modal-box h3 { margin-bottom: 0.5rem; font-size: 1.2rem; }
        .modal-box p { color: var(--text-light); margin-bottom: 1.5rem; line-height: 1.6; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
        .modal-actions button {
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
            transition: all 0.2s;
        }
        .modal-cancel { background: var(--bg); color: var(--text); }
        .modal-cancel:hover { background: #e5e7eb; }
        .modal-confirm { background: var(--danger); color: white; }
        .modal-confirm:hover { background: #dc2626; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            z-index: 1001;
            animation: slideUp 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .toast-success { background: #16a34a; color: white; }
        .toast-error { background: #dc2626; color: white; }

        /* ===== Loading ===== */
        .loading-container {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .booking-card { grid-template-columns: 1fr; }
            .booking-actions { text-align: left; align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
            .booking-meta { gap: 0.75rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-text">GrandStay</a>
        <div class="nav-links" id="nav-links-container">
            <!-- Dynamically populated by auth.js -->
        </div>
    </nav>

    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>My Bookings</h1>
            <a href="index.html" class="btn" style="width: auto; padding: 0.6rem 1.5rem; font-size: 0.9rem;">+ New Booking</a>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-card stat-total"><div class="stat-number" id="statTotal">-</div><div class="stat-label">Total</div></div>
            <div class="stat-card stat-confirmed"><div class="stat-number" id="statConfirmed">-</div><div class="stat-label">Confirmed</div></div>
            <div class="stat-card stat-pending"><div class="stat-number" id="statPending">-</div><div class="stat-label">Pending</div></div>
            <div class="stat-card stat-spent"><div class="stat-number" id="statSpent">-</div><div class="stat-label">Total Spent</div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('upcoming')" id="tab-upcoming">
                Upcoming <span class="tab-count" id="count-upcoming">0</span>
            </div>
            <div class="tab" onclick="switchTab('past')" id="tab-past">
                Past <span class="tab-count" id="count-past">0</span>
            </div>
            <div class="tab" onclick="switchTab('all')" id="tab-all">
                All <span class="tab-count" id="count-all">0</span>
            </div>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="loading-container">
            <div class="spinner"></div>
            <p>Loading your bookings...</p>
        </div>

        <!-- Content Views -->
        <div id="upcoming-view" class="hidden"></div>
        <div id="past-view" class="hidden"></div>
        <div id="all-view" class="hidden"></div>
    </div>

    <!-- Cancel Confirmation Modal (hidden by default) -->
    <div id="cancelModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>⚠️ Cancel Booking</h3>
            <p id="cancelModalText">Are you sure you want to cancel this booking? This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeCancelModal()">Keep Booking</button>
                <button class="modal-confirm" id="confirmCancelBtn" onclick="confirmCancel()">Yes, Cancel It</button>
            </div>
        </div>
    </div>

    <script>
        let allBookings = [];
        let upcomingData = [];
        let pastData = [];
        let cancelTargetId = null;

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        async function loadBookings() {
            try {
                const res = await fetch('http://127.0.0.1:8000/bookings/my/', { credentials: 'include' });

                if (res.status === 401 || res.status === 403) {
                    window.location.href = 'login.html';
                    return;
                }

                const data = await res.json();
                document.getElementById('loadingState').classList.add('hidden');

                upcomingData = data.upcoming.bookings;
                pastData = data.past.bookings;
                allBookings = [...upcomingData, ...pastData];

                // Update tab counts
                document.getElementById('count-upcoming').textContent = upcomingData.length;
                document.getElementById('count-past').textContent = pastData.length;
                document.getElementById('count-all').textContent = allBookings.length;

                // Update stats
                updateStats();

                // Render lists
                renderList('upcoming-view', upcomingData);
                renderList('past-view', pastData);
                renderList('all-view', allBookings);

                // Show default tab
                document.getElementById('upcoming-view').classList.remove('hidden');

            } catch (err) {
                document.getElementById('loadingState').innerHTML = '<p style="color: var(--danger);">Network error loading bookings. Please try again.</p>';
            }
        }

        function updateStats() {
            const confirmed = allBookings.filter(b => b.status === 'confirmed').length;
            const pending = allBookings.filter(b => b.status === 'pending').length;
            const totalSpent = allBookings
                .filter(b => b.status === 'confirmed')
                .reduce((sum, b) => sum + parseFloat(b.total_price), 0);

            document.getElementById('statTotal').textContent = allBookings.length;
            document.getElementById('statConfirmed').textContent = confirmed;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statSpent').textContent = `₹${totalSpent.toLocaleString('en-IN')}`;
        }

        function renderList(containerId, list) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <h3>No bookings here</h3>
                        <p>When you book a room, it will appear here.</p>
                        <a href="index.html" class="btn" style="display: inline-block; width: auto;">Search Rooms</a>
                    </div>
                `;
                return;
            }

            list.forEach(b => {
                const card = document.createElement('div');
                card.className = 'card booking-card';
                card.id = `booking-${b.id}`;

                // Build action buttons
                let actionButtons = '';
                if (b.status === 'pending' && b.hold_expires_at) {
                    actionButtons += `<a href="checkout.html?booking_id=${b.id}" class="pay-btn">Complete Payment</a>`;
                }
                if (b.can_cancel) {
                    actionButtons += `<button class="cancel-btn" onclick="openCancelModal('${b.id}', '${b.room.name}', '${b.booking_reference || ''}')">Cancel Booking</button>`;
                }

                card.innerHTML = `
                    <div>
                        <div class="booking-header">
                            <h3>${b.room.name}</h3>
                            <span class="badge ${b.status}">${b.status}</span>
                        </div>
                        <div class="booking-meta">
                            <div class="meta-item">
                                <span class="icon">📅</span>
                                <strong>${formatDate(b.check_in)}</strong> → <strong>${formatDate(b.check_out)}</strong>
                            </div>
                            <div class="meta-item">
                                <span class="icon">🌙</span>
                                ${b.num_nights} night${b.num_nights > 1 ? 's' : ''}
                            </div>
                            <div class="meta-item">
                                <span class="icon">👥</span>
                                ${b.guests} guest${b.guests > 1 ? 's' : ''}
                            </div>
                            <div class="meta-item">
                                <span class="icon">📍</span>
                                ${b.room.city}
                            </div>
                        </div>
                        <div class="booking-ref">
                            Ref: <span>${b.booking_reference || 'Awaiting Payment'}</span>
                        </div>
                    </div>
                    <div class="booking-actions">
                        <div class="booking-price">Rs. ${parseFloat(b.total_price).toLocaleString('en-IN')}</div>
                        <div class="booking-nights">${b.num_nights} night${b.num_nights > 1 ? 's' : ''} × Rs. ${b.room.price_per_night}</div>
                        ${actionButtons}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ===== Cancel Flow =====
        function openCancelModal(bookingId, roomName, ref) {
            cancelTargetId = bookingId;
            const refText = ref ? ` (Ref: ${ref})` : '';
            document.getElementById('cancelModalText').textContent =
                `Are you sure you want to cancel your booking for "${roomName}"${refText}? This action cannot be undone.`;
            document.getElementById('cancelModal').classList.remove('hidden');
        }

        function closeCancelModal() {
            cancelTargetId = null;
            document.getElementById('cancelModal').classList.add('hidden');
        }

        async function confirmCancel() {
            if (!cancelTargetId) return;

            const confirmBtn = document.getElementById('confirmCancelBtn');
            confirmBtn.disabled = true;
            confirmBtn.textContent = 'Cancelling...';

            try {
                const res = await fetch(`http://127.0.0.1:8000/bookings/${cancelTargetId}/cancel/`, {
                    method: 'POST',
                    credentials: 'include'
                });

                const data = await res.json();

                if (res.ok) {
                    closeCancelModal();
                    showToast('Booking cancelled successfully.', 'success');

                    // Animate the card out and reload
                    const card = document.getElementById(`booking-${cancelTargetId}`);
                    if (card) {
                        card.style.transition = 'all 0.4s';
                        card.style.opacity = '0';
                        card.style.transform = 'translateX(-20px)';
                    }
                    setTimeout(() => loadBookings(), 500);
                } else {
                    closeCancelModal();
                    showToast(data.error || 'Failed to cancel booking.', 'error');
                }
            } catch (err) {
                closeCancelModal();
                showToast('Network error. Please try again.', 'error');
            }

            confirmBtn.disabled = false;
            confirmBtn.textContent = 'Yes, Cancel It';
        }

        // ===== Toast Notifications =====
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `${type === 'success' ? '✅' : '❌'} ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ===== Tab Switching =====
        function switchTab(tab) {
            ['upcoming', 'past', 'all'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active');
                document.getElementById(`${t}-view`).classList.add('hidden');
            });
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`${tab}-view`).classList.remove('hidden');
        }

        loadBookings();
    </script>
</body>
</html>
