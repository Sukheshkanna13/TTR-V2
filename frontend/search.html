<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results - Hotel Booking</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
    <style>
        .search-layout { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; margin-top: 2rem; }
        .sidebar { background: var(--surface); padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 2rem; }
        .room-card { display: flex; gap: 1.5rem; }
        .room-info { flex: 1; }
        .room-price { text-align: right; min-width: 150px; display: flex; flex-direction: column; justify-content: center; align-items: flex-end;}
        .price-text { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .results-grid { display: grid; gap: 1.5rem; }
        
        @media (max-width: 768px) {
            .search-layout { grid-template-columns: 1fr; }
            .room-card { flex-direction: column; }
            .room-price { text-align: left; align-items: flex-start; }
            .sidebar { position: static; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-text">GrandStay</a>
        <div class="nav-links" id="nav-links-container">
            <!-- Dynamically populated by auth.js -->
        </div>
    </nav>

    <div class="container search-layout">
        <aside class="sidebar">
            <h3 style="margin-bottom: 1.5rem; font-size: 1.2rem;">Filter Results</h3>
            <form id="filterForm">
                <div class="form-group">
                    <label>Min Price (Rs.)</label>
                    <input type="number" id="min_price" name="min_price" placeholder="e.g. 1000">
                </div>
                <div class="form-group">
                    <label>Max Price (Rs.)</label>
                    <input type="number" id="max_price" name="max_price" placeholder="e.g. 10000">
                </div>
                <div class="form-group">
                    <label>Room Type</label>
                    <select id="room_type" name="room_type">
                        <option value="">All Types</option>
                        <option value="standard">Standard</option>
                        <option value="deluxe">Deluxe</option>
                        <option value="suite">Suite</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sort By</label>
                    <select id="sort" name="sort">
                        <option value="">Recommended</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Apply Filters</button>
            </form>
        </aside>

        <main>
            <h2 id="searchTitle" style="margin-bottom: 1.5rem;">Loading results...</h2>
            <div id="errorBox" class="alert hidden"></div>
            <div id="results" class="results-grid"></div>
        </main>
    </div>

    <script>
        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        let searchParams = {
            city: params.get('city'),
            check_in: params.get('check_in'),
            check_out: params.get('check_out'),
            guests: params.get('guests')
        };

        // Handle Filter Submission
        document.getElementById('filterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            // Only add filters if they are not empty
            const min_price = formData.get('min_price');
            const max_price = formData.get('max_price');
            const room_type = formData.get('room_type');
            const sort = formData.get('sort');

            if (min_price) searchParams.min_price = min_price; else delete searchParams.min_price;
            if (max_price) searchParams.max_price = max_price; else delete searchParams.max_price;
            if (room_type) searchParams.room_type = room_type; else delete searchParams.room_type;
            if (sort) searchParams.sort = sort; else delete searchParams.sort;

            loadRooms();
        });

        async function loadRooms() {
            try {
                const resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = '<p>Loading...</p>';
                document.getElementById('errorBox').classList.add('hidden');

                const query = new URLSearchParams(searchParams).toString();
                const res = await fetch(`http://127.0.0.1:8000/rooms/search/?${query}`);
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('errorBox').textContent = "Error: " + JSON.stringify(data.errors || data);
                    document.getElementById('errorBox').classList.remove('hidden');
                    resultsDiv.innerHTML = '';
                    return;
                }

                document.getElementById('searchTitle').textContent = data.message;
                
                resultsDiv.innerHTML = '';
                if (data.rooms.length === 0) {
                    resultsDiv.innerHTML = '<div class="card"><p style="text-align: center; padding: 2rem;">No rooms match your criteria. Try adjusting your filters.</p></div>';
                    return;
                }

                data.rooms.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'card room-card';
                    card.style.cursor = 'pointer';
                    card.onclick = (e) => {
                        if (e.target.tagName === 'BUTTON') return; // Let button handle its own click
                        window.location.href = `room-details.html?id=${room.id}&check_in=${searchParams.check_in}&check_out=${searchParams.check_out}&guests=${searchParams.guests}`;
                    };
                    card.innerHTML = `
                        <div class="room-info">
                            <h3 style="margin-bottom: 0.5rem; font-size: 1.3rem;">${room.name}</h3>
                            <p style="color: #666; font-size: 0.9rem; margin-bottom: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">${room.room_type} • Max ${room.capacity} Guests</p>
                            <p style="margin-bottom: 1rem; line-height: 1.6; color: var(--text-light);">${room.description ? room.description.substring(0, 120) + '...' : 'Comfortable room with premium amenities.'}</p>
                            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                                ${room.amenities_list.slice(0, 4).map(a => `<span style="background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 500;">${a}</span>`).join('')}
                                ${room.amenities_list.length > 4 ? `<span style="color: var(--primary); font-size: 0.8rem; font-weight: 600; padding: 4px 6px;">+${room.amenities_list.length - 4} more</span>` : ''}
                            </div>
                        </div>
                        <div class="room-price">
                            <div style="font-size: 0.85rem; color: #666; margin-bottom: 0.2rem;">From</div>
                            <div class="price-text">Rs. ${room.price_per_night}</div>
                            <div style="font-size: 0.85rem; color: #666; margin-bottom: 1rem;">per night</div>
                            <a href="room-details.html?id=${room.id}&check_in=${searchParams.check_in}&check_out=${searchParams.check_out}&guests=${searchParams.guests}" class="btn" style="width: 100%; text-align: center; font-size: 0.9rem;">View Details</a>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (err) {
                document.getElementById('errorBox').textContent = 'Network error fetching rooms.';
                document.getElementById('errorBox').classList.remove('hidden');
                document.getElementById('results').innerHTML = '';
            }
        }

        async function bookRoom(roomId) {
            try {
                const res = await fetch('http://127.0.0.1:8000/bookings/hold/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        room_id: roomId,
                        check_in: searchParams.check_in,
                        check_out: searchParams.check_out,
                        guests: parseInt(searchParams.guests)
                    })
                });

                if (res.status === 401 || res.status === 403) {
                    alert('Please login to book a room.');
                    window.location.href = 'login.html';
                    return;
                }

                const data = await res.json();
                if (res.ok) {
                    window.location.href = `checkout.html?booking_id=${data.booking.id}`;
                } else {
                    alert(data.error || 'Failed to hold room');
                }
            } catch (err) {
                alert('Network error during booking hold.');
            }
        }

        loadRooms();
    </script>
</body>
</html>
