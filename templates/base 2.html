{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GrandStay{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <a href="{% url 'core:home' %}" class="logo-text">GrandStay</a>
        <div class="nav-links" id="nav-links-container">
            {% if user.is_authenticated %}
                <div class="user-badge">
                    <span class="user-avatar">👤</span>
                    <span class="user-name">{{ user.full_name }}</span>
                </div>
                <a href="{% url 'bookings:my-bookings-page' %}" class="nav-btn">My Bookings</a>
                <button onclick="logout()" class="nav-btn btn-danger-outline">Logout</button>
            {% else %}
                <a href="{% url 'accounts:login-page' %}" class="nav-btn btn-primary-outline">Login</a>
                <a href="{% url 'accounts:register-page' %}" class="nav-btn btn-primary">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script>
        async function logout() {
            try {
                await fetch("{% url 'accounts:logout' %}", {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'X-CSRFToken': '{{ csrf_token }}' }
                });
                window.location.href = "{% url 'core:home' %}";
            } catch (err) {
                console.error("Logout failed:", err);
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
