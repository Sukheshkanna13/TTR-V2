{% extends "superadmin/base.html" %}
{% block title %}Employees{% endblock %}
{% block content %}
<h1 class="sa-page-title">Employees</h1>
<div class="sa-card">
  <table>
    <thead><tr><th>Name</th><th>Email</th><th>Role</th></tr></thead>
    <tbody>
    {% for u in employees %}
    <tr>
      <td>{{ u.full_name|default:"—" }}</td>
      <td>{{ u.email }}</td>
      <td><span class="badge badge-slate">{{ u.userprofile.role }}</span></td>
    </tr>
    {% empty %}
    <tr><td colspan="3" style="color:#64748b;padding:24px 12px;">No employees found.</td></tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
