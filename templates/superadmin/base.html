<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Super Admin{% endblock %} — Temples & Towns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Global resets and typography */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background-color: #FAFAF9;
  color: #1C1917;
  min-height: 100vh;
  line-height: 1.5;
  font-size: 14px;
}

/* Sidebar Layout */
.sa-layout {
  display: flex;
  min-height: 100vh;
}
.sa-sidebar {
  width: 240px;
  background-color: #FFFFFF;
  border-right: 1px solid #E7E5E4;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  z-index: 100;
}
.sa-main-wrapper {
  flex: 1;
  margin-left: 240px;
  min-width: 0;
}
.sa-sidebar-header {
  padding: 20px 24px;
  border-bottom: 1px solid #E7E5E4;
  display: flex;
  flex-direction: column;
}
body .sa-brand {
  font-size: 15px !important;
  font-weight: 600 !important;
  color: #1C1917 !important;
  letter-spacing: -0.02em !important;
  margin-bottom: 0 !important;
}
.sa-role {
  font-size: 11px;
  font-weight: 500;
  color: #78716C;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}
.sa-sidebar-body {
  flex: 1;
  padding: 16px 12px;
  overflow-y: auto;
}
.sa-nav-group {
  font-size: 10px;
  font-weight: 600;
  color: #A8A29E;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 16px 8px 6px 8px;
}
.sa-nav-group:first-child {
  margin-top: 0;
}
.sa-sidebar-body a {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  color: #78716C !important;
  text-decoration: none !important;
  font-size: 13px !important;
  font-weight: 500 !important;
  border-radius: 6px;
  transition: all 0.15s ease;
  margin-bottom: 2px;
}
.sa-sidebar-body a:hover {
  background-color: #F5F5F4 !important;
  color: #1C1917 !important;
}
.sa-sidebar-body a.active {
  background-color: #F5F5F4 !important;
  color: #0F766E !important;
  font-weight: 600 !important;
}
.sa-sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid #E7E5E4;
}
.sa-logout-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 8px 12px;
  color: #B91C1C !important;
  background-color: #FEE2E2 !important;
  border: 1px solid #FCA5A5 !important;
  border-radius: 6px;
  font-size: 13px !important;
  font-weight: 500 !important;
  text-decoration: none !important;
  transition: all 0.15s ease;
}
.sa-logout-btn:hover {
  background-color: #FCA5A5 !important;
  color: #991717 !important;
}

/* Main Layout content */
.sa-main{
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
}
body .sa-page-title{
  font-size: 20px !important;
  font-weight: 600 !important;
  color: #1C1917 !important;
  margin-bottom: 24px !important;
  letter-spacing: -0.02em !important;
}

/* Cards */
body .sa-card{
  background: #FFFFFF !important;
  border: 1px solid #E7E5E4 !important;
  border-radius: 8px !important;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
  overflow-x: auto !important;
}

/* Stats */
body .sa-stats{
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}
body .sa-stat{
  flex: 1;
  min-width: 140px;
}
body .sa-stat-val{
  font-size: 28px !important;
  font-weight: 600 !important;
  color: #1C1917 !important;
  font-variant-numeric: tabular-nums !important;
}
body .sa-stat-label{
  font-size: 11px !important;
  color: #78716C !important;
  margin-top: 4px !important;
  text-transform: uppercase !important;
  letter-spacing: 0.06em !important;
  font-weight: 500 !important;
}

/* Tables */
table{
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th{
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid #E7E5E4 !important;
  color: #78716C !important;
  font-weight: 500 !important;
  font-size: 11px !important;
  text-transform: uppercase !important;
  letter-spacing: 0.05em !important;
  white-space: nowrap !important;
  vertical-align: middle !important;
}
tbody td{
  padding: 12px 12px;
  border-bottom: 1px solid #E7E5E4 !important;
  color: #1C1917 !important;
  white-space: nowrap !important;
  vertical-align: middle !important;
}
tbody tr:hover td{
  background: #F5F5F4 !important;
}

/* Badges */
body .badge,
body .sa-badge{
  display: inline-block !important;
  padding: 2px 8px !important;
  border-radius: 100px !important;
  font-size: 11px !important;
  font-weight: 600 !important;
  text-transform: capitalize !important;
}
body .badge-green,
body .sa-badge-CONFIRMED,
body .sa-badge-confirmed,
body .sa-badge-COMPLETED,
body .sa-badge-completed,
body .sa-badge-active {
  background: #DCFCE7 !important;
  color: #15803D !important;
  border: 1px solid #BBF7D0 !important;
}
body .badge-slate,
body .sa-badge-EXPIRED,
body .sa-badge-expired,
body .sa-badge-held,
body .sa-badge-HELD {
  background: #FEF3C7 !important;
  color: #B45309 !important;
  border: 1px solid #FDE68A !important;
}
body .badge-red,
body .sa-badge-CANCELLED,
body .sa-badge-cancelled,
body .sa-badge-inactive {
  background: #FEE2E2 !important;
  color: #B91C1C !important;
  border: 1px solid #FCA5A5 !important;
}

/* Form inputs, buttons, and labels globally overriden with higher specificity */
body .sa-input,
body select.status-select,
body .status-select {
  background-color: #FFFFFF !important;
  border: 1px solid #E7E5E4 !important;
  color: #1C1917 !important;
  font-family: 'Inter', -apple-system, sans-serif !important;
  font-size: 13px !important;
  border-radius: 6px !important;
  padding: 6px 10px !important;
  outline: none !important;
  transition: border-color 0.15s ease, box-shadow 0.15s ease !important;
}
body .sa-input:focus,
body select.status-select:focus,
body .status-select:focus {
  border-color: #0F766E !important;
  box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.15) !important;
}
body .sa-input-inline {
  background-color: transparent !important;
  border-color: transparent !important;
  padding: 4px 6px !important;
}
body .sa-input-inline:hover,
body .sa-input-inline:focus {
  background-color: #FAFAF9 !important;
  border-color: #E7E5E4 !important;
}
body .sa-label {
  display: block !important;
  font-size: 11px !important;
  color: #78716C !important;
  margin-bottom: 4px !important;
  text-transform: uppercase !important;
  letter-spacing: .05em !important;
  font-weight: 500 !important;
}
body .sa-btn {
  display: inline-flex !important;
  align-items: center !important;
  padding: 6px 14px !important;
  border-radius: 6px !important;
  font-size: 13px !important;
  font-weight: 500 !important;
  cursor: pointer !important;
  border: 1px solid #E7E5E4 !important;
  background-color: #FFFFFF !important;
  color: #1C1917 !important;
  text-decoration: none !important;
  transition: all 0.15s ease !important;
  margin-right: 4px !important;
}
body .sa-btn:last-child {
  margin-right: 0 !important;
}
body .sa-btn:hover {
  background-color: #F5F5F4 !important;
  border-color: #D6D3D1 !important;
}
body .sa-btn-primary {
  background-color: #0F766E !important;
  border-color: #0F766E !important;
  color: #FFFFFF !important;
}
body .sa-btn-primary:hover {
  background-color: #0D645D !important;
  border-color: #0D645D !important;
}
body .sa-btn-success {
  background-color: #15803D !important;
  border-color: #15803D !important;
  color: #FFFFFF !important;
}
body .sa-btn-success:hover {
  background-color: #126631 !important;
  border-color: #126631 !important;
}
body .sa-btn-danger {
  background-color: #B91C1C !important;
  border-color: #B91C1C !important;
  color: #FFFFFF !important;
}
body .sa-btn-danger:hover {
  background-color: #991717 !important;
  border-color: #991717 !important;
}
body .sa-btn-sm {
  padding: 4px 10px !important;
  font-size: 12px !important;
}
body .sa-section-title {
  font-size: 15px !important;
  font-weight: 600 !important;
  color: #1C1917 !important;
  margin-bottom: 16px !important;
  letter-spacing: -0.01em !important;
}
code {
  font-family: monospace;
  font-size: 12px;
  background: #F5F5F4;
  color: #1C1917;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid #E7E5E4;
}

/* Modals */
body div[style*="position:fixed;inset:0;"] {
  background: rgba(28, 25, 23, 0.4) !important;
}
body div[style*="position:fixed;inset:0;"] > div {
  background: #FFFFFF !important;
  border: 1px solid #E7E5E4 !important;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1) !important;
}
body div[style*="position:fixed;inset:0;"] h3 {
  color: #1C1917 !important;
  font-weight: 600 !important;
}

/* Room Status Board overlays */
body div[style*="position:absolute;inset:0;background:rgba(0,0,0,.5);"] {
  background: rgba(250, 250, 249, 0.8) !important;
  color: #78716C !important;
}

/* Responsive sidebar */
@media (max-width: 1024px) {
  .sa-layout {
    flex-direction: column;
  }
  .sa-sidebar {
    position: static;
    width: 100%;
    height: auto;
    border-right: none;
    border-bottom: 1px solid #E7E5E4;
  }
  .sa-main-wrapper {
    margin-left: 0;
  }
  .sa-sidebar-body {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 12px 16px;
  }
  .sa-nav-group {
    display: none;
  }
  .sa-sidebar-footer {
    display: none;
  }
  body .sa-brand {
    text-align: center;
  }
}

/* Hide number input spinners */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] {
  -moz-appearance: textfield;
}

/* Custom layout spacing tweaks */
.sa-btn-sm {
  margin-right: 4px !important;
}
.sa-btn-sm:last-child {
  margin-right: 0 !important;
}
</style>
</head>
<body>
<div class="sa-layout">
  <aside class="sa-sidebar">
    <div class="sa-sidebar-header">
      <span class="sa-brand">Temples & Towns</span>
      <span class="sa-role">Super Admin</span>
    </div>
    <div class="sa-sidebar-body">
      <div class="sa-nav-group">Operations</div>
      <a href="/super-admin/dashboard/" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
        Dashboard
      </a>
      <a href="/super-admin/bookings/" {% if request.resolver_match.url_name == 'bookings' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Bookings
      </a>
      <a href="{% url 'superadmin:room-status-board' %}" {% if request.resolver_match.url_name == 'room-status-board' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M3 9h18"></path><path d="M9 21V9"></path></svg>
        Status Board
      </a>
      <a href="/super-admin/guests/" {% if request.resolver_match.url_name == 'guests' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Guests
      </a>
      <a href="/super-admin/employees/" {% if request.resolver_match.url_name == 'employees' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        Employees
      </a>
      <a href="/super-admin/analytics/" {% if request.resolver_match.url_name == 'analytics' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        Analytics
      </a>
 
      <div class="sa-nav-group">Configuration</div>
      <a href="/super-admin/properties/" {% if request.resolver_match.url_name == 'properties' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Properties
      </a>
      <a href="/super-admin/rooms/" {% if request.resolver_match.url_name == 'rooms' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
        Rooms
      </a>
      <a href="/super-admin/tax-config/" {% if request.resolver_match.url_name == 'tax-config' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="19" y1="5" x2="5" y2="19"></line><circle cx="6.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="17.5" r="2.5"></circle></svg>
        Tax Config
      </a>
      <a href="/super-admin/loyalty-config/" {% if request.resolver_match.url_name == 'loyalty-config' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
        Loyalty Config
      </a>
 
      <div class="sa-nav-group">Content & System</div>
      <a href="{% url 'superadmin:causes' %}" {% if request.resolver_match.url_name == 'causes' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        Travel for Cause
      </a>
      <a href="{% url 'superadmin:events' %}" {% if request.resolver_match.url_name == 'events' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        Events
      </a>
      <a href="/super-admin/audit-log/" {% if request.resolver_match.url_name == 'audit-log' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        Audit Log
      </a>
    </div>
    <div class="sa-sidebar-footer">
      <a href="/accounts/logout/" class="sa-logout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sign out
      </a>
    </div>
  </aside>
  
  <div class="sa-main-wrapper">
    <div class="sa-main">{% block content %}{% endblock %}</div>
  </div>
</div>
</body>
</html>
