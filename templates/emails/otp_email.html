<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f7; padding: 40px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto;">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 30px 0;">
                            <h1 style="color: #1a1a2e; font-size: 28px; font-weight: 700; margin: 0;">
                                Hotel Booking
                            </h1>
                            <p style="color: #6c757d; font-size: 14px; margin: 5px 0 0 0;">
                                Email Verification
                            </p>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td>
                            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; padding: 40px; text-align: center;">
                                <p style="color: rgba(255,255,255,0.9); font-size: 16px; margin: 0 0 25px 0;">
                                    Your verification code is:
                                </p>
                                <div style="background: rgba(255,255,255,0.15); border-radius: 12px; padding: 20px; display: inline-block;">
                                    <span style="color: #ffffff; font-size: 40px; font-weight: 700; letter-spacing: 10px;">
                                        {{ otp }}
                                    </span>
                                </div>
                                <p style="color: rgba(255,255,255,0.7); font-size: 13px; margin: 25px 0 0 0;">
                                    This code expires in <strong>10 minutes</strong>.
                                    <br>Do not share this code with anyone.
                                </p>
                            </div>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding: 30px 0;">
                            <p style="color: #6c757d; font-size: 12px; margin: 0;">
                                If you didn't request this code, please ignore this email.
                            </p>
                            <p style="color: #adb5bd; font-size: 11px; margin: 10px 0 0 0;">
                                &copy; {{ year }} Hotel Booking. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
