{% extends "base.html" %}
{% block title %}My Bookings — Temples &amp; Towns{% endblock %}

{% block content %}
<div class="tt-page" style="padding-top:40px;padding-bottom:80px;">

  <!-- Page header -->
  <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
    <h1 class="tt-h2" style="margin:0;">My bookings</h1>
    <a href="{% url 'core:home' %}" class="tt-btn tt-btn-ghost tt-btn-sm">+ New search</a>
  </div>

  <!-- Stats -->
  <div class="tt-stats-grid" id="statsBar">
    <div class="tt-stat-card">
      <div class="tt-stat-num" id="statTotal" style="color:var(--accent);">—</div>
      <div class="tt-stat-label">Total</div>
    </div>
    <div class="tt-stat-card">
      <div class="tt-stat-num" id="statConfirmed" style="color:#1a7f4b;">—</div>
      <div class="tt-stat-label">Confirmed</div>
    </div>
    <div class="tt-stat-card">
      <div class="tt-stat-num" id="statPending" style="color:#c47a00;">—</div>
      <div class="tt-stat-label">Pending</div>
    </div>
    <div class="tt-stat-card">
      <div class="tt-stat-num" id="statSpent" style="color:var(--ink);">—</div>
      <div class="tt-stat-label">Total spent</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tt-tabs">
    <div class="tt-tab active" id="tab-upcoming" onclick="switchTab('upcoming')">
      Upcoming <span class="tt-tab-count" id="count-upcoming">0</span>
    </div>
    <div class="tt-tab" id="tab-past" onclick="switchTab('past')">
      Past <span class="tt-tab-count" id="count-past">0</span>
    </div>
    <div class="tt-tab" id="tab-all" onclick="switchTab('all')">
      All <span class="tt-tab-count" id="count-all">0</span>
    </div>
  </div>

  <!-- Loading -->
  <div id="loadingState" class="tt-loading">
    <div class="tt-spinner"></div>
    <p>Loading your bookings…</p>
  </div>

  <!-- Booking lists -->
  <div id="upcoming-view" class="hidden"></div>
  <div id="past-view"     class="hidden"></div>
  <div id="all-view"      class="hidden"></div>

</div>

<!-- Cancel confirmation modal -->
<div id="cancelModal" class="tt-modal-backdrop hidden">
  <div class="tt-modal">
    <h3 style="font-size:18px;font-weight:700;color:var(--ink);margin:0 0 8px;">Cancel booking</h3>
    <p id="cancelModalText" style="font-size:14px;color:var(--text-soft);line-height:1.6;margin:0 0 24px;"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="closeCancelModal()" class="tt-btn tt-btn-ghost tt-btn-sm">Keep booking</button>
      <button id="confirmCancelBtn" onclick="confirmCancel()" class="tt-btn tt-btn-danger tt-btn-sm">Yes, cancel it</button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const MY_BOOKINGS_API = "{% url 'bookings:my-bookings' %}";
  const CANCEL_API_BASE = '/bookings/';
  const HOME_URL        = "{% url 'core:home' %}";
  const LOGIN_URL       = "{% url 'accounts:login-page' %}";
  const CHECKOUT_URL    = "{% url 'payments:checkout-page' %}";
  const CSRF_TOKEN      = '{{ csrf_token }}';

  let allBookings = [], upcomingData = [], pastData = [], cancelTargetId = null;

  function formatDate(d) {
    return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
  }

  function statusClass(s) {
    return { pending:'tt-status-pending', HELD:'tt-status-pending', confirmed:'tt-status-confirmed', cancelled:'tt-status-cancelled',
             expired:'tt-status-expired', failed:'tt-status-failed' }[s] || 'tt-status-completed';
  }

  async function loadBookings() {
    try {
      const res = await fetch(MY_BOOKINGS_API, { credentials: 'include' });
      if (res.status === 401 || res.status === 403) { window.location.href = LOGIN_URL; return; }
      const data = await res.json();
      document.getElementById('loadingState').classList.add('hidden');

      upcomingData = data.upcoming.bookings;
      pastData     = data.past.bookings;
      allBookings  = [...upcomingData, ...pastData];

      document.getElementById('count-upcoming').textContent = upcomingData.length;
      document.getElementById('count-past').textContent     = pastData.length;
      document.getElementById('count-all').textContent      = allBookings.length;

      updateStats();
      renderList('upcoming-view', upcomingData);
      renderList('past-view', pastData);
      renderList('all-view', allBookings);
      document.getElementById('upcoming-view').classList.remove('hidden');
    } catch {
      document.getElementById('loadingState').innerHTML = '<p style="color:var(--danger);">Network error loading bookings.</p>';
    }
  }

  function updateStats() {
    const confirmed  = allBookings.filter(b => b.status === 'confirmed').length;
    const pending    = allBookings.filter(b => b.status === 'pending' || b.status === 'HELD').length;
    const totalSpent = allBookings.filter(b => b.status === 'confirmed')
                                  .reduce((s, b) => s + parseFloat(b.total_price), 0);
    document.getElementById('statTotal').textContent     = allBookings.length;
    document.getElementById('statConfirmed').textContent = confirmed;
    document.getElementById('statPending').textContent   = pending;
    document.getElementById('statSpent').textContent     = `₹${totalSpent.toLocaleString('en-IN')}`;
  }

  function renderList(containerId, list) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    if (list.length === 0) {
      container.innerHTML = `
        <div class="tt-empty">
          <div class="icon">📋</div>
          <h3>No bookings here</h3>
          <p>When you book a room, it will appear here.</p>
          <a href="${HOME_URL}" class="tt-btn tt-btn-primary tt-btn-sm">Search rooms</a>
        </div>`;
      return;
    }

    list.forEach(b => {
      const sc  = statusClass(b.status);
      let actions = '';
      if ((b.status === 'pending' || b.status === 'HELD') && b.hold_expires_at) {
        actions += `<a href="${CHECKOUT_URL}?booking_id=${b.id}" class="tt-btn tt-btn-primary tt-btn-sm">Complete payment</a>`;
      }
      if (b.can_cancel) {
        actions += `<button class="tt-btn tt-btn-ghost tt-btn-sm" style="color:var(--danger);border-color:var(--danger);"
          onclick="openCancelModal('${b.id}','${b.room.name}','${b.booking_reference || ''}')">
          Cancel
        </button>`;
      }

      const card = document.createElement('div');
      card.id = `booking-${b.id}`;
      card.className = 'tt-card';
      card.style.cssText = 'flex-direction:row;align-items:center;gap:24px;padding:20px;cursor:default;';
      card.innerHTML = `
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;">
            <div style="font-size:17px;font-weight:600;color:var(--ink);">${b.room.name}</div>
            <span class="tt-status ${sc}">
              <span class="tt-status-dot"></span>${b.status}
            </span>
          </div>
          <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:13px;color:var(--text-soft);margin-bottom:8px;">
            <span>📅 <strong style="color:var(--ink);">${formatDate(b.check_in)}</strong> → <strong style="color:var(--ink);">${formatDate(b.check_out)}</strong></span>
            <span>🌙 ${b.num_nights} night${b.num_nights > 1 ? 's' : ''}</span>
            <span>👥 ${b.guests} guest${b.guests > 1 ? 's' : ''}</span>
            <span>📍 ${b.room.city}</span>
          </div>
          <div style="font-size:12px;color:var(--text-faint);">
            Ref: <code style="background:var(--bg-soft);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--ink);font-weight:600;">
              ${b.booking_reference || 'Awaiting payment'}
            </code>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:20px;font-weight:700;color:var(--ink);">₹${Number(b.total_price).toLocaleString('en-IN')}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">${b.num_nights} night${b.num_nights > 1 ? 's' : ''} × ₹${b.room.price_per_night}</div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">${actions}</div>
        </div>`;
      container.appendChild(card);
    });
  }

  function openCancelModal(bookingId, roomName, ref) {
    cancelTargetId = bookingId;
    document.getElementById('cancelModalText').textContent =
      `Are you sure you want to cancel your booking for "${roomName}"${ref ? ` (Ref: ${ref})` : ''}? This action cannot be undone.`;
    document.getElementById('cancelModal').classList.remove('hidden');
  }
  function closeCancelModal() {
    cancelTargetId = null;
    document.getElementById('cancelModal').classList.add('hidden');
  }

  async function confirmCancel() {
    if (!cancelTargetId) return;
    const confirmBtn = document.getElementById('confirmCancelBtn');
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Cancelling…';
    try {
      const res  = await fetch(`${CANCEL_API_BASE}${cancelTargetId}/cancel/`, {
        method: 'POST', credentials: 'include', headers: { 'X-CSRFToken': CSRF_TOKEN }
      });
      const data = await res.json();
      closeCancelModal();
      if (res.ok) {
        showToast('Booking cancelled successfully.', 'success');
        const card = document.getElementById(`booking-${cancelTargetId}`);
        if (card) { card.style.transition = 'all .4s'; card.style.opacity = '0'; card.style.transform = 'translateX(-20px)'; }
        setTimeout(() => loadBookings(), 500);
      } else {
        showToast(data.error || 'Failed to cancel.', 'error');
      }
    } catch {
      closeCancelModal();
      showToast('Network error.', 'error');
    }
    confirmBtn.disabled = false;
    confirmBtn.textContent = 'Yes, cancel it';
  }

  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `tt-toast tt-toast-${type}`;
    toast.textContent = (type === 'success' ? '✓ ' : '✕ ') + message;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0'; toast.style.transform = 'translateY(10px)';
      setTimeout(() => toast.remove(), 300);
    }, 3500);
  }

  function switchTab(tab) {
    ['upcoming','past','all'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.remove('active');
      document.getElementById(`${t}-view`).classList.add('hidden');
    });
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`${tab}-view`).classList.remove('hidden');
  }

  loadBookings();
</script>
{% endblock %}
