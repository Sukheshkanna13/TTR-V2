<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — Temples & Towns</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px; padding: 36px 32px; width: 100%; max-width: 400px; }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo span { font-weight: 700; font-size: 1.1rem; color: #f59e0b; }
  h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
  p.sub { color: #64748b; font-size: .875rem; margin-bottom: 22px; }
  label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: 5px; }
  input[type=password] { width: 100%; padding: 10px 12px; background: #0f1117; border: 1px solid #2a2d3e; border-radius: 6px; color: #e2e8f0; font-size: .9rem; margin-bottom: 14px; }
  input[type=password]:focus { outline: none; border-color: #f59e0b; }
  button { width: 100%; padding: 11px; background: #f59e0b; color: #000; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-size: .95rem; }
  button:hover { background: #d97706; }
  .error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #f87171; border-radius: 6px; padding: 10px 12px; font-size: .85rem; margin-bottom: 14px; }
  .hint { font-size: .78rem; color: #64748b; margin-top: -10px; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>Temples &amp; Towns</span></div>
  <h2>Set new password</h2>
  <p class="sub">Choose a strong password — at least 8 characters.</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <label for="password1">New password</label>
    <input type="password" id="password1" name="password1" minlength="8" required autofocus>
    <p class="hint">Minimum 8 characters</p>

    <label for="password2">Confirm password</label>
    <input type="password" id="password2" name="password2" minlength="8" required>

    <button type="submit" style="margin-top:6px;">Set Password</button>
  </form>
</div>
</body>
</html>
