{% extends "base.html" %}
{% block title %}Login - GrandStay{% endblock %}

{% block content %}
    <div class="container" style="max-width: 400px;">
        <div class="card">
            <h2 style="margin-bottom: 1rem;">Login</h2>
            <div id="errorBox" class="alert hidden"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Your password">
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Don't have an account? <a href="{% url 'accounts:register-page' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign Up here</a>
            </p>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');

            try {
                const res = await fetch("{% url 'accounts:login' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });

                if (res.ok) {
                    const data = await res.json();
                    if (data.user && data.user.is_staff) {
                        window.location.href = "/admin/";
                    } else {
                        window.location.href = "{% url 'home' %}";
                    }
                } else {
                    const data = await res.json();
                    errorBox.textContent = data.detail || data.error || 'Login failed';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = 'Network error';
                errorBox.classList.remove('hidden');
            }
        }
    </script>
{% endblock %}
