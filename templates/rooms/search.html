{% extends "base.html" %}
{% load static %}
{% block title %}Search Results — Temples &amp; Towns{% endblock %}

{% block content %}
<div class="tt-page">
  <div class="tt-results-layout">

    <!-- Filter sidebar -->
    <aside class="tt-sidebar">
      <div style="font-size:16px;font-weight:600;color:var(--ink);margin-bottom:20px;">Filter stays</div>
      <form id="filterForm">
        <div class="tt-field" style="margin-bottom:16px;">
          <label class="tt-field-label">Min price (₹)</label>
          <input class="tt-input" type="number" id="min_price" name="min_price" placeholder="e.g. 1,000">
        </div>
        <div class="tt-field" style="margin-bottom:16px;">
          <label class="tt-field-label">Max price (₹)</label>
          <input class="tt-input" type="number" id="max_price" name="max_price" placeholder="e.g. 10,000">
        </div>
        <div class="tt-field" style="margin-bottom:16px;">
          <label class="tt-field-label">Room type</label>
          <select class="tt-select" id="room_type" name="room_type">
            <option value="">All types</option>
            <option value="standard">Standard</option>
            <option value="deluxe">Deluxe</option>
            <option value="suite">Suite</option>
          </select>
        </div>
        <div class="tt-field" style="margin-bottom:24px;">
          <label class="tt-field-label">Sort by</label>
          <select class="tt-select" id="sort" name="sort">
            <option value="">Recommended</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
          </select>
        </div>
        <button type="submit" class="tt-btn tt-btn-primary tt-w-full">Apply filters</button>
      </form>

      <div class="tt-hr"></div>
      <a href="{% url 'core:home' %}" class="tt-btn tt-btn-ghost tt-w-full tt-btn-sm">← New search</a>
    </aside>

    <!-- Results -->
    <main>
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <h2 id="searchTitle" class="tt-h3" style="margin:0;">Loading…</h2>
      </div>
      <div id="errorBox" class="alert hidden" style="margin-bottom:20px;"></div>
      <div id="results" style="display:flex;flex-direction:column;gap:16px;"></div>
    </main>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const ROOM_DETAIL_URL = "{% url 'rooms:room-detail-page' %}";
  const SEARCH_API_URL  = "{% url 'rooms:search' %}";
  const CHECKOUT_URL    = "{% url 'payments:checkout-page' %}";
  const LOGIN_PAGE_URL  = "{% url 'accounts:login-page' %}";

  const urlParams  = new URLSearchParams(window.location.search);
  let searchParams = {
    city:     urlParams.get('city'),
    check_in: urlParams.get('check_in'),
    check_out: urlParams.get('check_out'),
    guests:   urlParams.get('guests')
  };

  document.getElementById('filterForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    ['min_price','max_price','room_type','sort'].forEach(k => {
      const v = fd.get(k);
      if (v) searchParams[k] = v; else delete searchParams[k];
    });
    loadRooms();
  });

  function roomDetailUrl(roomId) {
    return `${ROOM_DETAIL_URL}?id=${roomId}&check_in=${searchParams.check_in}&check_out=${searchParams.check_out}&guests=${searchParams.guests}`;
  }

  function badgeColor(type) {
    return { standard:'oklch(0.92 0.05 230)', deluxe:'oklch(0.92 0.06 290)', suite:'oklch(0.92 0.06 75)' }[type] || 'var(--bg-soft)';
  }

  async function loadRooms() {
    const resultsDiv = document.getElementById('results');
    const errorBox   = document.getElementById('errorBox');
    resultsDiv.innerHTML = `
      <div class="tt-loading">
        <div class="tt-spinner"></div>
        <p>Finding the best rooms for you…</p>
      </div>`;
    errorBox.classList.add('hidden');

    try {
      const res  = await fetch(`${SEARCH_API_URL}?${new URLSearchParams(searchParams)}`);
      const data = await res.json();

      if (!res.ok) {
        errorBox.textContent = 'Error: ' + JSON.stringify(data.errors || data);
        errorBox.classList.remove('hidden');
        resultsDiv.innerHTML = '';
        return;
      }

      document.getElementById('searchTitle').textContent = data.message;
      resultsDiv.innerHTML = '';

      if (data.rooms.length === 0) {
        resultsDiv.innerHTML = `
          <div class="tt-empty">
            <div class="icon">🔍</div>
            <h3>No rooms found</h3>
            <p>Try adjusting your dates, destination, or filters.</p>
            <a href="{% url 'core:home' %}" class="tt-btn tt-btn-primary tt-btn-sm">Back to search</a>
          </div>`;
        return;
      }

      data.rooms.forEach(room => {
        const detailUrl = roomDetailUrl(room.id);
        const amenityChips = room.amenities_list.slice(0,4)
          .map(a => `<span class="tt-chip tt-chip-tonal" style="font-size:12px;padding:5px 10px;">${a}</span>`)
          .join('');
        const extra = room.amenities_list.length > 4
          ? `<span style="font-size:12px;color:var(--accent);font-weight:500;padding:5px 4px;">+${room.amenities_list.length - 4} more</span>`
          : '';

        const card = document.createElement('div');
        card.className = 'tt-card tt-room-card';
        card.style.cursor = 'pointer';
        card.onclick = (e) => {
          if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
          window.location.href = detailUrl;
        };
        card.innerHTML = `
          <div class="tt-room-card-img">
            <div class="tt-img" style="height:100%;min-height:160px;">
              <div class="tt-img-stripes" style="--tone:${badgeColor(room.room_type)};"></div>
              <div style="position:absolute;inset:0;display:flex;align-items:flex-end;padding:12px;">
                <span class="tt-tag" style="font-size:11px;padding:4px 10px;">${room.room_type}</span>
              </div>
            </div>
          </div>
          <div class="tt-room-card-info">
            <div>
              <div class="tt-card-name">${room.name}</div>
              <div class="tt-card-area" style="margin-top:4px;">
                ${room.room_type.charAt(0).toUpperCase() + room.room_type.slice(1)} · Max ${room.capacity} guests
              </div>
            </div>
            <p class="tt-card-blurb" style="margin:0;">
              ${room.description ? room.description.substring(0,130) + '…' : 'Comfortable room with premium amenities.'}
            </p>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">${amenityChips}${extra}</div>
          </div>
          <div class="tt-room-card-price">
            <div>
              <div class="tt-eyebrow" style="margin-bottom:4px;">From</div>
              <div class="tt-card-price">₹${Number(room.price_per_night).toLocaleString('en-IN')}</div>
              <div style="font-size:13px;color:var(--text-muted);margin-top:2px;">per night</div>
            </div>
            <a href="${detailUrl}" class="tt-btn tt-btn-primary tt-btn-sm">View details</a>
          </div>`;
        resultsDiv.appendChild(card);
      });

    } catch (err) {
      errorBox.textContent = 'Network error fetching rooms.';
      errorBox.classList.remove('hidden');
      resultsDiv.innerHTML = '';
    }
  }

  loadRooms();
</script>
{% endblock %}
