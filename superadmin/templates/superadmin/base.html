<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Super Admin{% endblock %} — Temples & Towns</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --border: #2a2d3e;
    --accent: #f59e0b;
    --accent-hover: #d97706;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ef4444;
    --success: #22c55e;
    --sidebar-w: 220px;
  }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
  /* Sidebar */
  .sa-sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
  .sa-logo { padding: 20px 16px; border-bottom: 1px solid var(--border); }
  .sa-logo span { color: var(--accent); font-weight: 700; font-size: 1rem; letter-spacing: .5px; }
  .sa-logo small { display: block; color: var(--muted); font-size: .7rem; margin-top: 2px; }
  .sa-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .sa-nav a { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: var(--muted); text-decoration: none; font-size: .875rem; transition: background .15s, color .15s; }
  .sa-nav a:hover, .sa-nav a.active { background: rgba(245,158,11,.08); color: var(--accent); }
  .sa-nav a .icon { width: 18px; text-align: center; }
  .sa-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
  .sa-footer a { color: var(--muted); font-size: .8rem; text-decoration: none; }
  .sa-footer a:hover { color: var(--danger); }
  /* Main */
  .sa-main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .sa-topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; }
  .sa-topbar h1 { font-size: 1.1rem; font-weight: 600; }
  .sa-topbar .user-chip { background: var(--border); border-radius: 20px; padding: 4px 12px; font-size: .8rem; color: var(--muted); }
  .sa-content { padding: 24px; flex: 1; }
  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .card-title { font-size: .85rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
  .card-value { font-size: 2rem; font-weight: 700; }
  /* Grid helpers */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 900px) { .grid-4 { grid-template-columns: 1fr 1fr; } .grid-2 { grid-template-columns: 1fr; } }
  /* Tables */
  .sa-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  .sa-table th { text-align: left; padding: 10px 12px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: .8rem; text-transform: uppercase; letter-spacing: .3px; }
  .sa-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .sa-table tr:last-child td { border-bottom: none; }
  .sa-table tr:hover td { background: rgba(255,255,255,.02); }
  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .75rem; font-weight: 500; }
  .badge-success { background: rgba(34,197,94,.15); color: var(--success); }
  .badge-danger { background: rgba(239,68,68,.15); color: var(--danger); }
  .badge-muted { background: rgba(100,116,139,.15); color: var(--muted); }
  .badge-accent { background: rgba(245,158,11,.15); color: var(--accent); }
  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; font-size: .8rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: background .15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--danger); }
  .btn-danger:hover { background: rgba(239,68,68,.25); }
  .btn-ghost { background: var(--border); color: var(--text); }
  .btn-ghost:hover { background: #3a3d4e; }
  .btn-sm { padding: 5px 10px; font-size: .75rem; }
  /* Form controls */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 5px; }
  .form-control { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .875rem; }
  .form-control:focus { outline: none; border-color: var(--accent); }
  select.form-control option { background: var(--surface); }
  /* Section header */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-head h2 { font-size: 1rem; font-weight: 600; }
  /* Alerts */
  .alert { padding: 10px 14px; border-radius: 6px; font-size: .875rem; margin-bottom: 16px; }
  .alert-info { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.2); color: var(--accent); }
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-width: 360px; max-width: 480px; width: 90%; }
  .modal-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
</style>
</head>
<body>
<aside class="sa-sidebar">
  <div class="sa-logo">
    <span>Temples &amp; Towns</span>
    <small>Super Admin</small>
  </div>
  <nav class="sa-nav">
    <a href="{% url 'superadmin:dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <span class="icon">⬛</span> Dashboard
    </a>
    <a href="{% url 'superadmin:employees' %}" class="{% if 'employee' in request.resolver_match.url_name %}active{% endif %}">
      <span class="icon">👥</span> Employees
    </a>
    <a href="{% url 'superadmin:analytics' %}" class="{% if request.resolver_match.url_name == 'analytics' %}active{% endif %}">
      <span class="icon">📊</span> Analytics
    </a>
    <a href="{% url 'superadmin:bookings' %}" class="{% if request.resolver_match.url_name == 'bookings' %}active{% endif %}">
      <span class="icon">📋</span> Bookings
    </a>
    <a href="{% url 'superadmin:tax-config' %}" class="{% if request.resolver_match.url_name == 'tax-config' %}active{% endif %}">
      <span class="icon">🧾</span> Tax Config
    </a>
    <a href="{% url 'superadmin:loyalty-config' %}" class="{% if request.resolver_match.url_name == 'loyalty-config' %}active{% endif %}">
      <span class="icon">⭐</span> Loyalty
    </a>
    <a href="{% url 'superadmin:audit-log' %}" class="{% if request.resolver_match.url_name == 'audit-log' %}active{% endif %}">
      <span class="icon">🔍</span> Audit Log
    </a>
  </nav>
  <div class="sa-footer">
    <a href="{% url 'accounts:logout' %}">↩ Logout</a>
  </div>
</aside>
<main class="sa-main">
  <div class="sa-topbar">
    <h1>{% block page_title %}Dashboard{% endblock %}</h1>
    <span class="user-chip">{{ request.user.email }}</span>
  </div>
  <div class="sa-content">
    {% block content %}{% endblock %}
  </div>
</main>
</body>
</html>
