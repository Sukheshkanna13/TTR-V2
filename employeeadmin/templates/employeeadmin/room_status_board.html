{% extends "employeeadmin/base.html" %}
{% block title %}Status Board{% endblock %}
{% block page_title %}Room Status Board{% endblock %}
{% block content %}

<div class="section-head" style="margin-bottom:18px;">
  <div>
    <h2 style="margin-bottom:4px;">Room Status Board</h2>
    <p style="font-size:.78rem;color:var(--muted);">Last updated: <span id="last-updated">—</span></p>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="fetchBoard()">↻ Refresh</button>
</div>

<div id="board-container">
  <div style="text-align:center;padding:40px;color:var(--muted);">Loading…</div>
</div>

<script>
const CSRF = '{{ csrf_token }}';

const STATUS_LABELS = {
  available: 'Available',
  cleaning: 'Cleaning',
  maintenance: 'Maintenance',
  out_of_order: 'Out of Order'
};

const STATUS_CLASSES = {
  available: 'badge-green',
  cleaning: 'badge-yellow',
  maintenance: 'badge-yellow',
  out_of_order: 'badge-red'
};

const STATUS_CHOICES = [
  {% for value, label in status_choices %}
  { value: '{{ value }}', label: '{{ label }}' },
  {% endfor %}
];

function badgeHtml(status) {
  const cls = STATUS_CLASSES[status] || 'badge-grey';
  const lbl = STATUS_LABELS[status] || status;
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function activeHtml(is_active) {
  return is_active
    ? '<span class="badge badge-green">Active</span>'
    : '<span class="badge badge-grey">Inactive</span>';
}

function dropdownHtml(roomId, currentStatus) {
  const opts = STATUS_CHOICES.map(c =>
    `<option value="${c.value}" ${c.value === currentStatus ? 'selected' : ''}>${c.label}</option>`
  ).join('');
  return `
    <div style="display:flex;gap:6px;align-items:center;">
      <select id="sel-${roomId}" class="form-control" style="width:140px;padding:5px 8px;">
        ${opts}
      </select>
      <button class="btn btn-primary btn-sm" onclick="updateStatus('${roomId}')">Update</button>
    </div>`;
}

function groupByProperty(rooms) {
  const map = {};
  rooms.forEach(r => {
    const prop = r.property || 'Unknown Property';
    if (!map[prop]) map[prop] = [];
    map[prop].push(r);
  });
  return map;
}

function renderBoard(rooms) {
  if (!rooms || rooms.length === 0) {
    document.getElementById('board-container').innerHTML =
      '<div class="card" style="text-align:center;padding:40px;color:var(--muted);">No rooms found.</div>';
    return;
  }

  const grouped = groupByProperty(rooms);
  let html = '';

  for (const [property, propRooms] of Object.entries(grouped)) {
    const rows = propRooms.map(r => `
      <tr id="row-${r.id}">
        <td style="font-weight:500;">${r.name}</td>
        <td id="status-badge-${r.id}">${badgeHtml(r.status)}</td>
        <td>${activeHtml(r.is_active)}</td>
        <td>${dropdownHtml(r.id, r.status)}</td>
      </tr>`).join('');

    html += `
      <div class="card" style="margin-bottom:16px;">
        <div class="section-head" style="margin-bottom:12px;">
          <h2 style="font-size:.9rem;">${property}</h2>
          <span style="font-size:.75rem;color:var(--muted);">${propRooms.length} room${propRooms.length !== 1 ? 's' : ''}</span>
        </div>
        <table class="ea-table">
          <thead>
            <tr>
              <th>Room</th>
              <th>Status</th>
              <th>Active</th>
              <th>Update Status</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  document.getElementById('board-container').innerHTML = html;
}

function updateLastUpdated() {
  const now = new Date();
  document.getElementById('last-updated').textContent = now.toLocaleTimeString();
}

function fetchBoard() {
  fetch('/admin-portal/rooms/status-board/data/', {
    headers: { 'X-CSRFToken': CSRF }
  })
    .then(r => r.json())
    .then(data => {
      renderBoard(data.rooms || []);
      updateLastUpdated();
    })
    .catch(() => {
      document.getElementById('board-container').innerHTML =
        '<div class="card" style="text-align:center;padding:40px;color:var(--danger);">Failed to load room data. Check your connection.</div>';
    });
}

function updateStatus(roomId) {
  const sel = document.getElementById('sel-' + roomId);
  const newStatus = sel.value;

  fetch(`/admin-portal/rooms/${roomId}/status/`, {
    method: 'POST',
    headers: {
      'X-CSRFToken': CSRF,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ operational_status: newStatus })
  })
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        alert(d.error);
      } else {
        document.getElementById('status-badge-' + roomId).innerHTML = badgeHtml(newStatus);
      }
    })
    .catch(() => alert('Failed to update status. Please try again.'));
}

// Initial load + 60s polling
fetchBoard();
setInterval(fetchBoard, 60000);
</script>
{% endblock %}
